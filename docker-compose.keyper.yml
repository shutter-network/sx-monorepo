# Keyper operator stack — multi-operator deployment.
#
# Run this on your own droplet. You hold only your private key and your token.
# The hub and the other keypers are external.
#
# Required .env on this machine:
#   KEYPER_PRIVATE_KEY    Your keyper's Ethereum private key (keep secret)
#   COORDINATOR_ADDRESS   The hub operator's coordinator address (public,
#                         non-secret -- get it from them once, out of band)
#   KEYPER_HUB_URL        Public URL of the hub (https://hub.example.com)
#
# Optional .env:
#   KEYPER_ID             Keyper ID assigned by the hub operator (default: 1)
#   KEYPER_PORT           Port to listen on (default: 5001)
#   KEYPER_DKG_RETENTION_TIME   Seconds to keep DKG secrets after decrypt (default: 172800)
#   KEYPER_DKG_PRUNE_INTERVAL_S Background prune interval in seconds (default: 3600)
#   KEYPER_STATE_DIR_HOST Host-side bind-mount path for encrypted state (default: ./keyper-state).
#                         Only matters if you're running more than one instance of this
#                         compose file on the same machine (e.g. local multi-operator testing
#                         via `docker compose -p keyper2 ...`) -- give each instance its own
#                         path, or they'll silently overwrite each other's encrypted state.
#                         A real single-operator deployment never needs to set this.
#
# Quick start:
#   cp .env.keyper.example .env
#   mkdir -p keyper-state
#   docker compose -f docker-compose.keyper.yml up -d
#
# Operator onboarding (one-time):
#   1. Set COORDINATOR_ADDRESS in .env (given to you by the hub operator)
#   2. Share your public URL with the hub operator
#   3. Start the service
# No token to generate or share -- the hub operator's auto-dkg coordinator
# mints your bearer tokens and pushes them automatically over an encrypted,
# signed channel once it can reach your /status endpoint. See
# docs/private-voting/keyper-token-bootstrap.md.

services:
  keyper:
    build:
      context: ./services/keypers
    image: sx-keypers:local
    command:
      - python
      - /app/src/keyper.py
      - --id
      - "${KEYPER_ID:-1}"
      - --port
      - "${KEYPER_PORT:-5001}"
      - --host
      - "0.0.0.0"
    environment:
      KEYPER_HUB_URL: ${KEYPER_HUB_URL}
      KEYPER_PRIVATE_KEY: ${KEYPER_PRIVATE_KEY}
      COORDINATOR_ADDRESS: ${COORDINATOR_ADDRESS}
      KEYPER_DKG_RETENTION_TIME: "${KEYPER_DKG_RETENTION_TIME:-172800}"
      KEYPER_DKG_PRUNE_INTERVAL_S: "${KEYPER_DKG_PRUNE_INTERVAL_S:-3600}"
    ports:
      # Published to the host so other keypers and auto-dkg can reach this service.
      - "${KEYPER_PORT:-5001}:${KEYPER_PORT:-5001}"
    volumes:
      - ${KEYPER_STATE_DIR_HOST:-./keyper-state}:/keyper-state
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:${KEYPER_PORT:-5001}/health')"
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
