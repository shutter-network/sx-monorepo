# Local 3-keyper committee for permanent private voting (Variant A, t=1, n=3).
#
# Use:
#   cd services/keypers
#   docker compose up --build
#
# Each keyper exposes its REST API on the host at 5001 / 5002 / 5003. The
# DKG coordinator (`src/dkg_coordinator.py`) is run separately, e.g.:
#   python src/dkg_coordinator.py \
#     --keypers http://localhost:5001,http://localhost:5002,http://localhost:5003 \
#     --proposal-id 0xdeadbeef --n 3 --t 1
#
# Hub URL defaults to http://host.docker.internal:3000 so keypers can reach
# the dev hub running on the host. Set KEYPER_HUB_URL to override.
#
# KEYPER_PRIVATE_KEY_{1,2,3} are dev defaults — derived deterministically
# from "keyper-{id}" via SHA-256. The corresponding addresses are
# documented in services/keypers/README.md and must match the proposal's
# te_keyper_addresses allow-list.

services:
  keyper1:
    build: .
    command: ["python", "/app/src/keyper.py", "--id", "1", "--port", "5001", "--host", "0.0.0.0"]
    environment:
      KEYPER_HUB_URL: ${KEYPER_HUB_URL:-http://host.docker.internal:3000}
      KEYPER_PRIVATE_KEY: ${KEYPER_PRIVATE_KEY_1:-}
    ports:
      - "5001:5001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  keyper2:
    build: .
    command: ["python", "/app/src/keyper.py", "--id", "2", "--port", "5002", "--host", "0.0.0.0"]
    environment:
      KEYPER_HUB_URL: ${KEYPER_HUB_URL:-http://host.docker.internal:3000}
      KEYPER_PRIVATE_KEY: ${KEYPER_PRIVATE_KEY_2:-}
    ports:
      - "5002:5002"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  keyper3:
    build: .
    command: ["python", "/app/src/keyper.py", "--id", "3", "--port", "5003", "--host", "0.0.0.0"]
    environment:
      KEYPER_HUB_URL: ${KEYPER_HUB_URL:-http://host.docker.internal:3000}
      KEYPER_PRIVATE_KEY: ${KEYPER_PRIVATE_KEY_3:-}
    ports:
      - "5003:5003"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
